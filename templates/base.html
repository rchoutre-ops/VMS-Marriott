<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}VMS Marriott{% endblock %}</title>
  <!-- Flash theme from localStorage before render to avoid flicker -->
  <script>
    (function () {
      var t = localStorage.getItem("vms-theme");
      if (t === "light") document.documentElement.setAttribute("data-theme", "light");
    })();
  </script>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <div class="app-shell">
    <nav class="topbar">
      <div class="topbar-left">
        <a class="brand" href="/">
          <div class="brand-mark">M</div>
          <span class="brand-name">VMS Marriott</span>
        </a>
        <div class="nav-pills">
          <a class="nav-pill {% block nav_dashboard %}{% endblock %}" href="/">Dashboard</a>
          <a class="nav-pill {% block nav_schedule %}{% endblock %}" href="/schedule">Schedule</a>
        </div>
      </div>
      <div class="topbar-right">
        <div class="online-indicator">
          <span class="online-dot"></span>
          <span>Online</span>
        </div>
        <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme" title="Toggle dark/light mode">
          <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        {% if user %}
        <div class="user-chip">
          {% if user.picture %}
          <img class="user-avatar" src="{{ user.picture }}" alt="{{ user.name }}" referrerpolicy="no-referrer">
          {% else %}
          <div class="user-avatar-placeholder">{{ user.name[0].upper() }}</div>
          {% endif %}
          <span class="user-name">{{ user.name.split()[0] }}</span>
        </div>
        <a class="topbar-link" href="/logout">Sign out</a>
        {% endif %}
      </div>
    </nav>

    <div class="page-wrapper">
      {% block content %}{% endblock %}
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>

  {% block scripts %}{% endblock %}

  <script>
    document.getElementById("theme-toggle").addEventListener("click", function () {
      var current = document.documentElement.getAttribute("data-theme");
      var next = current === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      localStorage.setItem("vms-theme", next);
    });
  </script>
</body>
</html>
